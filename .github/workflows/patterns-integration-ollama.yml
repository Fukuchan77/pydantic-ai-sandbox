# Spec 005 Req 8.2 / plan §6 — redesigned per the CI-strategy improvement plan
# (specs/ci-strategy-review/improvement-plan.md, items P1 + P2), then narrowed
# further to manual-only (CI optimization: Actions usage-limit control).
#
# WHY THIS IS NOT AUTOMATIC AT ALL (supersedes P1's nightly + main-push
# surface). Live 8B Ollama inference is slow, non-deterministic, and
# environment-bound; running six lanes nightly plus on every patterns merge
# was consuming the GitHub Actions usage budget. Trigger surface:
# `workflow_dispatch` ONLY. Per-PR/-push quality stays deterministic and fast
# via patterns-ci.yml (offline unit/contracts/lint/pyright/coverage).
# Operational rule: dispatch this workflow manually from the Actions tab after
# merges that touch patterns/ runtime surfaces or when validating an Ollama
# daemon/model bump. This trigger contract is pinned by
# tests/unit/test_ollama_ci_workflows.py — update the guard test together with
# any change here.
#
# WHY A PER-LANE MATRIX (P2). Each lane runs in its own job with its own Ollama
# daemon and a generous per-lane `timeout-minutes`: failures stay local to a
# lane, the slow lanes no longer starve the others, and total wall-clock drops
# via parallelism. This is what lets the llamaindex lane rejoin (it stays
# quarantined from per-PR via RUN_LLAMAINDEX_INTEGRATION, which its dedicated
# mise task opts into) — job isolation is the precondition the quarantine note
# called out.
#
# The daemon scaffolding (docker run + ~/.ollama cache + readiness loop +
# pull-if-missing + log artifact) is cloned from integration-ollama.yml — see
# that file for the rationale on each step. The `restore-keys: ollama-model-`
# prefix deliberately shares the existing model blob cache with the app's
# integration lane so the ~5GB granite pull happens at most once per cache epoch.
#
# Each lane's mise task (`patterns:test:integration:<lane>`) runs that lane's
# whole tests/integration/ suite — six contract-level e2e cases per framework
# lane (Spec 006-2a Req 12.2) — and is the single source of truth for how the
# lane is exercised live (Constitution V).

name: patterns-integration-ollama

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  OLLAMA_MODEL_NAME: granite4.1:8b
  # RAG lane (Spec 007-2b Req 11.2 / Q-2): the gated e2e builds the index with a
  # real Ollama embedding model, supplied here as a sibling to the generation
  # LLM. Pinned to an explicit tag (model-ID hygiene — never `:latest`); the
  # granite-embedding family keeps parity with the granite4.1 generation model.
  # 278m is the multilingual variant (563MB). Only the rag lane pulls it.
  OLLAMA_EMBED_MODEL_NAME: granite-embedding:278m
  OLLAMA_BASE_URL: http://localhost:11434/v1

jobs:
  e2e:
    name: integration (${{ matrix.lane }})
    runs-on: ubuntu-latest
    # Per-lane budget (P2). Generous so a slow CPU runner finishes one lane's
    # 8B inference without the cross-lane contention that broke the old single
    # job; llamaindex gets the most headroom (it was the slowest to converge).
    timeout-minutes: ${{ matrix.timeout }}
    # Job-level concurrency keyed by lane so a duplicate dispatch cancels only
    # the same lane's in-flight run, never a sibling lane.
    concurrency:
      group: patterns-integration-ollama-${{ github.ref }}-${{ matrix.lane }}
      cancel-in-progress: true
    strategy:
      # One lane's breakage must not cancel the others (plan §6 / P2 isolation).
      fail-fast: false
      matrix:
        include:
          - lane: beeai
            dir: patterns/frameworks/beeai
            task: 'patterns:test:integration:beeai'
            embed: false
            timeout: 60
          - lane: pydantic-ai
            dir: patterns/frameworks/pydantic-ai
            task: 'patterns:test:integration:pydantic-ai'
            embed: false
            timeout: 60
          - lane: llamaindex
            dir: patterns/frameworks/llamaindex
            task: 'patterns:test:integration:llamaindex'
            embed: false
            timeout: 90
          - lane: rag
            dir: patterns/rag
            task: 'patterns:test:integration:rag'
            embed: true
            timeout: 60
          - lane: sse
            dir: patterns/sse
            task: 'patterns:test:integration:sse'
            embed: false
            timeout: 60
          - lane: deep-research
            dir: patterns/deep-research
            task: 'patterns:test:integration:deep-research'
            embed: false
            timeout: 60
          - lane: hitl
            dir: patterns/hitl
            task: 'patterns:test:integration:hitl'
            embed: false
            timeout: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise + tooling
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          # Pin action SHA + mise binary version: stop fetching a moving "latest"
          # mise asset (the transient 404 of root cause #1 / plan P5).
          version: 2026.6.10
          experimental: true
          install: true
          cache: true

      - name: Sync contracts + lane
        # Sync only this lane (plus the shared contracts package the framework
        # lanes import via tool.uv.sources) — not the whole patterns tree — so a
        # lane job stays lean and isolated.
        run: |
          (cd patterns/contracts && uv sync --all-groups)
          (cd "${{ matrix.dir }}" && uv sync --all-groups)

      - name: Restore Ollama model cache
        id: ollama-cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          # Per-lane save key (suffix ${{ matrix.lane }}) so concurrent lanes never
          # race to reserve/upload the *same* key — that race fails the cache
          # post-step and reds an otherwise-green job (observed: a slow lane saving
          # while a sibling's identical-key upload was in flight). The shared
          # `restore-keys: ollama-model-` prefix still lets every lane restore from
          # any sibling's cache, so the ~5 GB model is pulled at most once per epoch;
          # GitHub evicts least-recently-used entries to stay within the repo cache
          # cap. (CI-strategy P5 — flaky elimination.)
          key: ollama-model-${{ hashFiles('.github/workflows/patterns-integration-ollama.yml') }}-granite4.1-8b-granite-embedding-278m-${{ matrix.lane }}
          restore-keys: |
            ollama-model-

      - name: Start Ollama daemon
        run: |
          mkdir -p "${HOME}/.ollama"
          docker run -d \
            --name ollama \
            --restart unless-stopped \
            -p 11434:11434 \
            -v "${HOME}/.ollama:/root/.ollama" \
            ollama/ollama:latest

      - name: Wait for daemon readiness
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null; then
              echo "daemon ready"; exit 0
            fi
            sleep 2
          done
          echo "::error::Ollama daemon failed to become ready within 60s"
          docker logs ollama || true
          exit 1

      - name: Pull model (skip if cached)
        run: |
          if docker exec ollama ollama list 2>/dev/null \
              | awk 'NR>1 {print $1}' \
              | grep -Fxq "${OLLAMA_MODEL_NAME}"; then
            echo "model already cached: ${OLLAMA_MODEL_NAME}"
          else
            echo "pulling ${OLLAMA_MODEL_NAME}..."
            docker exec ollama ollama pull "${OLLAMA_MODEL_NAME}"
          fi

      # Only the rag lane embeds with a real Ollama model (Spec 007-2b Req 11.2
      # / Q-2). Per-lane isolation (P2) means the other jobs never pay the
      # ~563MB embedding-model warm-up.
      - name: Pull embedding model (skip if cached)
        if: ${{ matrix.embed }}
        run: |
          if docker exec ollama ollama list 2>/dev/null \
              | awk 'NR>1 {print $1}' \
              | grep -Fxq "${OLLAMA_EMBED_MODEL_NAME}"; then
            echo "model already cached: ${OLLAMA_EMBED_MODEL_NAME}"
          else
            echo "pulling ${OLLAMA_EMBED_MODEL_NAME}..."
            docker exec ollama ollama pull "${OLLAMA_EMBED_MODEL_NAME}"
          fi

      - name: Run lane integration suite
        run: mise run "${{ matrix.task }}"

      - name: Capture Ollama daemon logs
        if: always()
        run: docker logs ollama > ollama-daemon.log 2>&1 || true

      - name: Upload daemon logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patterns-ollama-daemon-${{ matrix.lane }}-${{ github.run_id }}
          path: ollama-daemon.log
          retention-days: 14
