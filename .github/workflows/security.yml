# Spec Req 9.1, 9.3, 9.4, 9.5 / Plan §4.3 / tasks.md T12.2 — schedule surface
# since expanded (CI optimization: scheduled jobs focus on security).
#
# Two-tool security lane:
#   * pip-audit: Python dependency CVE scan (PyPI Advisory DB) — root project
#     AND every patterns/ lane lockfile (each lane is an independent uv
#     project; see the patterns-pip-audit job).
#   * gitleaks: secret scanning across the working tree + commit history.
#
# Python static security scanning (Req 9.2) is satisfied elsewhere — ruff's
# `S` rule set (flake8-bandit Py3 superset) runs every CI lane via
# `mise run check`. Keeping bandit out of this workflow honours the
# Spec Q3 amendment (research.md "bandit 非導入の根拠"): standalone bandit
# would be duplicate detection cost without coverage gain.
#
# Triggers:
#   * push / pull_request (merge-time protection): root pip-audit + gitleaks.
#   * DAILY cron: dependency CVE scans — root uv.lock plus every patterns/
#     lane lockfile. Unchanged lanes never re-enter patterns-ci, so the
#     schedule is the only way a newly filed advisory against a frozen
#     lockfile gets detected.
#   * WEEKLY cron (Mon): gitleaks full-history scan.
#   * workflow_dispatch: everything, on demand.
# GitHub Actions binds all crons to the single `on.schedule` list; jobs route
# by comparing `github.event.schedule` against a cron string, so the strings
# in the job `if:` expressions MUST stay byte-identical to the strings below
# (guarded by tests/unit/test_ollama_ci_workflows.py). Cron minutes are
# intentionally off-zero to avoid the scheduler's :00 stampede on hour
# boundaries.

name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 1 * * *'  # daily: pip-audit (root + patterns lanes)
    - cron: '17 2 * * 1'  # weekly Mon: gitleaks full-history scan
  workflow_dispatch: {}

# Independent of ci.yml: a PR may trigger both lanes and they should not
# cancel each other. Per-ref cancellation only inside this workflow. Scheduled
# runs share group `security-refs/heads/main` with cancel-in-progress: false,
# so the daily and weekly crons never cancel each other.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write  # gitleaks-action / supply-chain summary may comment

jobs:
  pip-audit:
    name: pip-audit (PyPI Advisory DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs on push / PR / dispatch / the daily cron; skipped on the weekly
    # gitleaks cron (the daily cron under an hour earlier already covered it).
    if: github.event_name != 'schedule' || github.event.schedule == '23 1 * * *'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise + tooling
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          # Pin action SHA + mise binary version: stop fetching a moving "latest"
          # mise asset (the transient 404 of root cause #1 / plan P5).
          version: 2026.6.10
          experimental: true
          install: true
          cache: true

      - name: Sync project dependencies
        run: uv sync --all-groups

      # ----------------------------------------------------------------------
      # Spec Req 9.1: pip-audit on every push and weekly cron.
      # Spec Req 9.4: HIGH/CRITICAL findings MUST fail the job.
      #
      # pip-audit's default exit code is 1 on any reported vulnerability, so
      # the job failing is the "block PR auto-merge" mechanism. We use
      # `--strict` to surface advisories that pip-audit might otherwise demote
      # to warnings (e.g., "fix not yet available").
      #
      # Resolver-consistency strategy: pip-audit's recent releases require
      # `--disable-pip` to be paired with `-r/--requirement`, so we export
      # uv.lock to a requirements file first. `uv export` reproduces the lock
      # exactly (no re-resolution), and `--disable-pip` keeps pip-audit from
      # second-guessing the pinned set. This replaces the bare
      # `pip-audit --disable-pip` form which now exits 2 with
      # "The --disable-pip flag can only be used with --requirement (-r)".
      # ----------------------------------------------------------------------
      # Hash-pinned export so pip-audit's `--disable-pip` is satisfied without
      # `--no-deps` (pip-audit's own guidance: "users are encouraged to fully
      # hash their pinned dependencies"). uv.lock already records hashes for
      # every resolved artifact, so `uv export` faithfully reproduces them.
      - name: Export uv.lock to requirements.txt (hash-pinned)
        run: |
          uv export \
            --format requirements-txt \
            --no-emit-project \
            --all-groups \
            -o requirements.txt

      - name: Run pip-audit
        run: |
          uv run pip-audit \
            --strict \
            --disable-pip \
            --requirement requirements.txt

      # Job summary captures the same output for human review even when the
      # step exits 0 (no findings). pip-audit prints to stderr in some modes;
      # the JSON form is more grep-able for downstream tooling.
      - name: pip-audit JSON summary
        if: always()
        run: |
          uv run pip-audit \
            --strict \
            --disable-pip \
            --requirement requirements.txt \
            --format json \
            > pip-audit-report.json || true
          {
            echo '## pip-audit'
            echo '```json'
            cat pip-audit-report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Patterns lanes are independent uv projects with independent lockfiles.
  # patterns-ci.yml audits a lane only when a PR/push touches its paths, so an
  # unchanged lane never learns about a newly filed advisory. This job closes
  # that gap on the daily cron (and on demand via dispatch). push/PR are
  # deliberately excluded: patterns-ci already audits changed lanes there.
  # Steps mirror patterns-ci.yml's audit shape (setup-uv + `uv sync --locked` +
  # plain `uv run pip-audit`) so a finding here reproduces locally with
  # `mise run patterns:audit`.
  patterns-pip-audit:
    name: pip-audit patterns (${{ matrix.lane }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '23 1 * * *')
    strategy:
      # One lane's CVE must not hide the others' status.
      fail-fast: false
      matrix:
        include:
          - { lane: contracts,     dir: patterns/contracts }
          - { lane: pydantic-ai,   dir: patterns/frameworks/pydantic-ai }
          # beeai carries a lane-scoped suppression for GHSA-xf7x-x43h-rpqh
          # (json-repair < 0.60.1): the fix is unreachable — beeai-framework
          # (==0.1.39 pin, and even latest 0.1.81) caps json-repair<0.53.0.
          # SECURITY-NOTES.md runbook (Spec 013 R8.1/8.2); review by
          # 2026-10-14 or on any beeai-framework bump. Tracking: #30.
          - { lane: beeai,         dir: patterns/frameworks/beeai, audit_args: '--ignore-vuln GHSA-xf7x-x43h-rpqh' }
          - { lane: llamaindex,    dir: patterns/frameworks/llamaindex }
          - { lane: rag,           dir: patterns/rag }
          - { lane: sse,           dir: patterns/sse }
          - { lane: deep-research, dir: patterns/deep-research }
          - { lane: hitl,          dir: patterns/hitl }
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # uv reads each lane's .python-version and provisions the matching
      # interpreter — same step shape as patterns-ci.yml (plan AD-5).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: ${{ matrix.dir }}/uv.lock

      # --locked: audit exactly what the lockfile pins; drift fails loudly
      # here rather than silently re-resolving.
      - name: Sync lane dependencies (locked)
        run: uv sync --all-groups --locked

      # `audit_args` is empty for every lane except the runbook-suppressed
      # beeai entry above.
      - name: pip-audit
        run: uv run pip-audit ${{ matrix.audit_args }}

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs on push / PR / dispatch (cheap merge-time protection) plus the
    # weekly full-history cron; skipped on the daily pip-audit cron.
    if: github.event_name != 'schedule' || github.event.schedule == '17 2 * * 1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan past commits, not just HEAD.
          # Without fetch-depth: 0 a leaked secret rotated out a few commits
          # ago would silently slip through.
          fetch-depth: 0

      # ----------------------------------------------------------------------
      # Spec Req 9.3: gitleaks runs on every push.
      # Spec Req 9.4: gitleaks-action exits non-zero on findings, failing the
      # job and blocking auto-merge.
      #
      # Action version is the official gitleaks/gitleaks-action; see
      # .pre-commit-config.yaml's gitleaks rev for the matching local binary
      # version (currently v8.21.x). The action consumes .gitleaks.toml at
      # the repo root if present (T12.4) for false-positive allowlists.
      # ----------------------------------------------------------------------
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  supply-chain-summary:
    # Spec Req 9.5 is delivered as documentation+process: dependabot.yml
    # (T12.5) labels supply-chain-watch dependencies; this job posts a
    # reminder on every run so reviewers don't have to remember the policy.
    name: supply-chain-watch reminder
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Emit policy reminder
        run: |
          {
            echo '## Supply-chain watch (Req 9.5)'
            echo ''
            echo 'Dependencies tagged `supply-chain-watch` in '
            echo '`.github/dependabot.yml` MUST NOT be auto-merged. A human'
            echo 'reviewer is required for any version change. Current'
            echo 'watchlist (idea0.md §14):'
            echo ''
            echo '- `litellm` (2026-03 yank incident)'
            echo ''
            echo 'See [README.md](../README.md) and `.github/dependabot.yml`'
            echo 'for the operational rule.'
          } >> "$GITHUB_STEP_SUMMARY"
