# Spec Req 9.5 / Plan §4.3 / tasks.md T12.5.
#
# Weekly dependency monitoring. Two ecosystems are tracked:
#   1. pip   — runtime + dev deps resolved from pyproject.toml. uv's
#              lockfile is consumed transparently by Dependabot's pip
#              ecosystem; no extra configuration needed.
#   2. github-actions — pinned action versions in .github/workflows/*.yml.
#              Catches deprecation of e.g. actions/checkout@v3, action
#              SHA rotation, etc.
#
# Supply-chain watchlist (Spec Req 9.5 + 11.4 + idea0.md §14): packages with a
# documented incident history get an extra `supply-chain-watch` label
# AND explicit reviewers, marking them as never-auto-merge. The labels
# are also surfaced in security.yml's job summary so reviewers don't
# need to remember the policy.
#
# Registered watchlist packages (spec 002-watsonx-provider task 1.2):
#   - litellm        — 2026-03 release yank (idea0.md §14).
#   - ibm-watsonx-ai — 1.5.12 broke import on Python 3.14.5 (ADR-1); a bad
#                      bump can silently re-break the SDK lane, so it is
#                      reviewed individually rather than auto-grouped.

version: 2

updates:
  # ---------------------------------------------------------------------------
  # Python runtime + dev dependencies (pyproject.toml + uv.lock).
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:13"  # off-zero minute (avoid the :00 stampede)
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: scope
    # Group routine patch + minor bumps so 10 separate libs don't generate
    # 10 separate PRs. Major bumps stay individual so they get full review.
    groups:
      python-minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "litellm"            # supply-chain-watch — never group
          - "ibm-watsonx-ai"     # supply-chain-watch (ADR-1) — never group
          - "pydantic-ai*"       # V2 Beta is unstable; review individually
        update-types:
          - minor
          - patch
    # ------------------------------------------------------------------
    # Spec Req 9.5 / 11.4: supply-chain-watch dependencies are flagged with
    # extra labels + reviewers so they're visibly not-auto-mergeable.
    # `litellm` and `ibm-watsonx-ai` are the registered watchlist packages
    # (idea0.md §14 2026-03 yank; ADR-1 py3.14 import break respectively).
    # When a new package joins the watchlist, add it here AND mention
    # it in security.yml's `supply-chain-summary` job.
    # ------------------------------------------------------------------
    ignore: []
    # Per-dep overrides cannot be expressed in the v2 schema as a map (a
    # second pip block for "/" would overlap and is rejected; `labels`
    # apply per-block, not per-dependency). The watchlist is therefore
    # enforced via the `groups.exclude-patterns` above (so litellm and
    # ibm-watsonx-ai bumps surface as standalone PRs) plus a label-bump
    # workflow that applies the `supply-chain-watch` label (see README.md
    # "Supply-chain watch operational rule" for the manual review checklist).

  # ---------------------------------------------------------------------------
  # patterns/ framework lanes (Spec 005 Req 7.2 / plan §7). Each lane is an
  # independent uv project with its own lockfile; `directories` fans the same
  # weekly policy out to all three. pydantic-ai stays ungrouped for the same
  # V2-Beta review reason as the root entry; beeai-framework is pinned exact
  # (plan §8 R-1: the test fake subclasses ChatModel internals), so its bumps
  # must surface as individual PRs too.
  # ---------------------------------------------------------------------------
  - package-ecosystem: pip
    directories:
      - "/patterns/frameworks/pydantic-ai"
      - "/patterns/frameworks/beeai"
      - "/patterns/frameworks/llamaindex"
    schedule:
      interval: weekly
      day: monday
      time: "06:33"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      - "patterns"
    commit-message:
      prefix: "deps(patterns)"
      include: scope
    groups:
      patterns-minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "pydantic-ai*"
          - "beeai-framework"
        update-types:
          - minor
          - patch

  # ---------------------------------------------------------------------------
  # GitHub Actions pinned in .github/workflows/*.yml.
  # ---------------------------------------------------------------------------
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:23"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
