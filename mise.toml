[tools]
python = "3.14"
uv = "latest"

# Tooling priority is `mise run <task>` first, `uv run <cmd>` second
# (Constitution V / global guidelines). Bare invocations of ruff / pyright /
# pytest are prohibited; every quality gate flows through this file.

[tasks.lint]
description = "Ruff lint check (security S / complexity C90 / docstrings D / naming N)."
run = "uv run ruff check ."

[tasks.format]
description = "Ruff format verification — no in-place rewrites."
run = "uv run ruff format --check ."

[tasks.typecheck]
description = "Pyright strict type-check against Python 3.14."
run = "uv run pyright"

[tasks.test]
description = "Run unit + integration suites under pytest-asyncio auto mode."
run = "uv run pytest"

[tasks.cov]
# Coverage-gated run; `--cov` (no path) measures the `[tool.coverage.run] source`
# from pyproject.toml and enforces the `fail_under` ratchet (currently 98). This
# is the canonical invocation for the coverage gate (spec 003 Task 7.1 / Req 10.4).
description = "Coverage-gated test run enforcing the fail_under ratchet."
run = "uv run pytest --cov --cov-report=term-missing"

[tasks.check]
description = "Aggregate quality gate (Constitution V, Req 7.5)."
depends = ["lint", "format", "typecheck", "test"]

[tasks.setup]
# `uv sync` now installs the project editable on its own — pyproject.toml
# declares hatchling as the build backend so uv treats this as a packaged
# project rather than a virtual one (replaces the prior `uv pip install -e .`
# workaround; PDCA Act 2026-05-24 / Mistake-2 — closed).
description = "Bootstrap a fresh checkout: sync deps and install pre-commit hooks."
run = "uv sync && uv run pre-commit install"

[tasks."pre-commit:default"]
description = "Run the default pre-commit stage (lint / format / pyright / gitleaks / forbid-hardcoded-model-ids)."
run = "uv run pre-commit run --all-files"

[tasks."pre-commit:manual"]
description = "Run the manual pre-commit stage (pytest / pip-audit) — invoked in CI and on demand."
run = "uv run pre-commit run --all-files --hook-stage manual"

[tasks."test:integration"]
description = "Run the Ollama integration lane; gated by RUN_INTEGRATION_OLLAMA=1 inside the suite."
run = "RUN_INTEGRATION_OLLAMA=1 uv run pytest tests/integration"

[tasks.dev]
description = "Run the FastAPI app via uvicorn with hot reload (development)."
run = "uv run uvicorn pydantic_ai_sandbox.main:app --reload --env-file .env"

[tasks.serve]
description = "Run the FastAPI app via uvicorn (production-style, no reload)."
run = "uv run uvicorn pydantic_ai_sandbox.main:app --host 0.0.0.0 --port 8000 --env-file .env"
